---
name: arianna
confinement: strict
grade: stable
base: core24
adopt-info: arianna
apps:
  arianna:
    extensions:
      - kde-neon-6
    common-id: org.kde.arianna.desktop
    desktop: usr/share/applications/org.kde.arianna.desktop
    command: usr/bin/arianna
    plugs:
      - home
      - browser-support
      - udisks2
    environment:
      QTWEBENGINE_DISABLE_SANDBOX: 1
slots:
  session-dbus-interface:
    interface: dbus
    name: org.kde.arianna
    bus: session
parts:
  arianna:
    parse-info:
      - usr/share/metainfo/org.kde.arianna.appdata.xml
    plugin: cmake
    source: .
    source-type: local
    build-snaps:
      - kde-qt6-core24-sdk/latest/beta
      - kf6-core24-sdk/latest/beta
    build-packages:
      - libduktape207
      - libdrm2
    cmake-parameters:
      - -DCMAKE_INSTALL_PREFIX=/usr
      - -DCMAKE_BUILD_TYPE=Release
      - -DQT_MAJOR_VERSION=6
      - -DBUILD_TESTING=OFF
    prime:
      - -usr/lib/*/cmake/*
      - -usr/include/*
      - -usr/share/ECM/*
      - -usr/share/man/*
      - -usr/bin/X11
      - -usr/lib/gcc/$CRAFT_ARCH_TRIPLET_BUILD_FOR/6.0.0
      - -usr/lib/aspell/*
      - -usr/share/lintian
  gpu-2404:
    after: [arianna]
    source: https://github.com/canonical/gpu-snap.git
    plugin: dump
    override-prime: |
      craftctl default
      ${CRAFT_PART_SRC}/bin/gpu-2404-cleanup mesa-2404
    prime:
      - bin/gpu-2404-wrapper
  cleanup:
    after:
      - arianna
    plugin: nil
    build-snaps:
      - core24
      - kf6-core24
    override-prime: |
      set -eux
      for snap in "core24" "kf6-core24"; do
          cd "/snap/$snap/current" && find . -type f,l -exec rm -rf "${CRAFT_PRIME}/{}" \;
      done
